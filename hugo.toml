baseURL = 'https://literaconite.com/'
title = 'Literaconite: Gothic Poetry and Literary Criticism'
theme = 'PaperMod'
defaultContentLanguage = 'en'
enableRobotsTXT = true
buildDrafts = false

[outputs]
  home = ["HTML","RSS","JSON"]

[pagination]
  pagerSize = 10

[params]
  env = "production"
  defaultTheme = "dark"
  disableThemeToggle = true
  ShowReadingTime = true
  ShowWordCount = false
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = false
  ShowCodeCopyButtons = true
  ShowToc = true
  disableSpecial1stPost = true
  TocOpen = false
  mainSections = ["poetry","review"]
  description = "Literaconite is a literary journal of original Gothic poetry and close criticism, dark, romantic, and haunted by the canon."
  author = "Emrecan Koc"
  DateFormat = "January 2, 2006"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/emrecankoc6"

  [[params.socialIcons]]
    name = "letterboxd"
    url = "https://letterboxd.com/scyllaborder"

[permalinks]
  poetry = "/poetry/:slug/"
  review = "/review/:slug/"

[[menu.main]]
  name = "Poetry"
  url = "/poetry/"
  weight = 10
  title = "Read original Gothic and Romantic poetry"

[[menu.main]]
  name = "Reviews"
  url = "/review/"
  weight = 20
  title = "Literary criticism and close readings"

[[menu.main]]
  name = "Search"
  url = "/search/"
  weight = 30
  title = "Search all poetry and reviews"

[[menu.main]]
  name = "Archive"
  url = "/archives/"
  weight = 40
  title = "Full archive of all posts"

[markup.goldmark.renderer]
  hardWraps = true

[markup.highlight]
  style = "monokai"
  lineNos = false
