baseURL = 'https://emrecankoc6.github.io/Literaconite/'
title = 'Literaconite'
theme = 'PaperMod'
defaultContentLanguage = 'en'

[pagination]
  pagerSize = 10

[params]
  env = "production"
  defaultTheme = "dark"
  disableThemeToggle = true
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  mainSections = ["poetry", "review"]
  description = "A literary journal of poetry and criticism — gothic in spirit, romantic in voice."
  author = "Emrecan Koç"
  keywords = ["poetry", "literary criticism", "gothic", "romanticism", "Emrecan Koç"]

  [params.homeInfoParams]
    Title = "Literaconite"
    Content = "> *\"The boundaries which divide Life from Death are at best shadowy and vague. Who shall say where the one ends, and where the other begins?\"*\n>\n> — Edgar Allan Poe\n\nWelcome to a corner of the web devoted to poetry and literary reflection. Here you will find original verse and close readings of the works that haunt us."

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/emrecankoc6"

[permalinks]
  poetry = "/poetry/:slug/"
  review = "/review/:slug/"

[[menu.main]]
  name = "Poetry"
  url = "/poetry/"
  weight = 10

[[menu.main]]
  name = "Reviews"
  url = "/review/"
  weight = 20

[markup.goldmark.renderer]
  hardWraps = true
