baseURL = 'https://emrecankoc6.github.io/Literaconite/'
title = 'Literaconite'
theme = 'PaperMod'
defaultContentLanguage = 'en'
enableRobotsTXT = true
buildDrafts = false
buildFuture = false

[outputs]
  home = ["HTML", "RSS", "JSON"]

[pagination]
  pagerSize = 10

[params]
  env = "production"
  defaultTheme = "dark"
  disableThemeToggle = true
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  mainSections = ["poetry", "review"]
  description = "A literary journal of poetry and criticism — gothic in spirit, romantic in voice."
  author = "Emrecan Koç"
  keywords = ["poetry", "literary criticism", "gothic", "romanticism", "Emrecan Koç"]
  DateFormat = "January 2, 2006"
  customCSS = ["css/gothic-override.css"]

  [params.homeInfoParams]
    Title = "Literaconite"
    Content = "> *\"The boundaries which divide Life from Death are at best shadowy and vague. Who shall say where the one ends, and where the other begins?\"*\n>\n> — Edgar Allan Poe\n\nA corner of the web devoted to poetry and literary reflection. Original verse and close readings of the works that haunt us."

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/emrecankoc6"

  [[params.socialIcons]]
    name = "rss"
    url = "/Literaconite/index.xml"

[permalinks]
  poetry = "/poetry/:slug/"
  review = "/review/:slug/"

[[menu.main]]
  name = "Poetry"
  url = "/poetry/"
  weight = 10

[[menu.main]]
  name = "Reviews"
  url = "/review/"
  weight = 20

[[menu.main]]
  name = "Search"
  url = "/search/"
  weight = 30

[[menu.main]]
  name = "Archive"
  url = "/archives/"
  weight = 40

[markup.goldmark.renderer]
  hardWraps = true

[markup.highlight]
  style = "monokai"
  lineNos = false
