baseURL = 'https://emrecankoc6.github.io/Literaconite/'
languageCode = 'en-us'
title = 'Literaconite'
theme = 'PaperMod'

[params]
    env = "production"
    description = "Literary criticism and poetry by Emre Can Koc."
    author = "Emre Can Koc"
    defaultTheme = "dark"
    disableThemeToggle = true
    # Ana sayfada tüm yazıları göster
    mainSections = ["poetry", "review"]

[[menu.main]]
    name = "Poetry"
    url = "poetry/"
    weight = 10
[[menu.main]]
    name = "Reviews"
    url = "review/"
    weight = 20
