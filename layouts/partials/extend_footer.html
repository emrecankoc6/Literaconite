{{ if and .IsPage (not (eq .Section "")) }}
{{/* ── related posts ── */}}
{{ $related := .Site.RegularPages.Related . | first 4 }}
{{ with $related }}
<aside class="lc-related">
  <h4 class="lc-related-title">Continue reading</h4>
  <div class="lc-related-grid">
    {{ range . }}
    <a href="{{ .RelPermalink }}" class="lc-related-card">
      <span class="lc-related-section">{{ .Section }}</span>
      <span class="lc-related-name">{{ .Title }}</span>
    </a>
    {{ end }}
  </div>
</aside>
{{ end }}
{{ end }}
