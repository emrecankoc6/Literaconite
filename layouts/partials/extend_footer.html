{{ if and .IsPage (not (eq .Section "")) }}
{{ $rel := .Site.RegularPages.Related . | first 4 }}
{{ with $rel }}
<aside class="lc-related">
  <h4>Continue reading</h4>
  <div class="lc-related-grid">
    {{ range . }}
    <a class="lc-related-card" href="{{ .RelPermalink }}">
      <span class="lc-related-sec">{{ .Section }}</span>
      <span class="lc-related-title">{{ .Title }}</span>
    </a>
    {{ end }}
  </div>
</aside>
{{ end }}
{{ end }}
