<script>
// Reading progress bar
(function(){
  var bar = document.getElementById('reading-progress');
  if (!bar) return;
  window.addEventListener('scroll', function(){
    var scrollTop = window.scrollY || document.documentElement.scrollTop;
    var docH = document.documentElement.scrollHeight - window.innerHeight;
    bar.style.width = docH > 0 ? (scrollTop / docH * 100) + '%' : '0%';
  }, {passive:true});
})();

// Ember/ash particle system — homepage only
(function(){
  var canvas = document.getElementById('particle-canvas');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var W, H, particles = [], RAF;
  var COUNT = window.innerWidth < 600 ? 28 : 55;

  function resize(){
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize, {passive:true});

  function rand(a,b){ return a + Math.random()*(b-a); }

  function Particle(){
    this.reset();
  }
  Particle.prototype.reset = function(){
    this.x  = rand(0, W);
    this.y  = rand(-20, H);
    this.r  = rand(0.8, 2.2);
    this.vx = rand(-0.3, 0.3);
    this.vy = rand(0.15, 0.55);
    this.alpha = rand(0.1, 0.55);
    this.life  = rand(0.003, 0.007);
    this.hue   = Math.random() > 0.7 ? 'rgba(184,150,62,' : 'rgba(192,57,61,';
  };
  Particle.prototype.update = function(){
    this.x  += this.vx + Math.sin(this.y * 0.02) * 0.3;
    this.y  += this.vy;
    this.alpha -= this.life;
    if (this.alpha <= 0 || this.y > H + 10) this.reset();
  };
  Particle.prototype.draw = function(){
    ctx.save();
    ctx.globalAlpha = Math.max(0, this.alpha);
    ctx.fillStyle   = this.hue + this.alpha + ')';
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  };

  for (var i=0; i<COUNT; i++) particles.push(new Particle());

  function loop(){
    ctx.clearRect(0,0,W,H);
    for (var i=0; i<particles.length; i++){
      particles[i].update();
      particles[i].draw();
    }
    RAF = requestAnimationFrame(loop);
  }
  loop();

  // Respect reduced-motion
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches){
    cancelAnimationFrame(RAF);
    canvas.style.display = 'none';
  }
})();
</script>
